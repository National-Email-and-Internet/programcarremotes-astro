name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add servers to known_hosts
        run: |
          ssh-keyscan -H 51.79.92.134 >> ~/.ssh/known_hosts
          ssh-keyscan -H 15.235.46.226 >> ~/.ssh/known_hosts

      - name: Deploy to WEB-01
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" \
            dist/ ubuntu@51.79.92.134:/var/www/programcarremotes.com/

      - name: Deploy to WEB-02
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" \
            dist/ ubuntu@15.235.46.226:/var/www/programcarremotes.com/
